version: "3"

vars:
  APP_NAME: quadboard
  CMD_DIR: ./cmd/quadboard
  BIN_DIR: ./bin

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the application
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/{{.APP_NAME}} {{.CMD_DIR}}

  run:
    desc: Run the application
    deps:
      - build
    cmds:
      - ./{{.BIN_DIR}}/{{.APP_NAME}}

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .
      - gofumpt -w .

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}

  check:
    desc: Run all verification tasks
    deps:
      - fmt
      - lint
      - test